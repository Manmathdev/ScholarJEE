    <style>
        :root {
            /* The ScholarJEE Palette — Deep Espresso & Warm Copper */
            --bg-dark:      #1a1209;          /* Deep Espresso            */
            --card-dark:    #2c2318;          /* Darkened Taupe           */
            --text-light:   #f2ede6;          /* Warm Alabaster           */
            --text-muted:   #a89880;          /* Muted Sand               */
            --accent-green: #c8763a;          /* Brightened Copper        */
            --green-glow:   rgba(200,118,58,0.10);

            --font-serif: 'Playfair Display', serif;
            --font-sans:  'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: var(--font-sans);
            line-height: 1.6;
        }

        /* Navigation Header */
        header {
            padding: 1.75rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            text-decoration: none;
            color: var(--text-light);
            font-weight: 600;
        }
        .logo span { color: var(--accent-green); }

        nav ul { display: flex; list-style: none; gap: 2rem; }
        nav a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
            transition: 0.3s;
        }
        nav a:hover, .active-nav { color: var(--accent-green); }

        .container {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 5%;
        }

        /* --- The Back Link --- */
                .back-link {
                    position: absolute;
                    top: 2.5rem;
                    left: 5%;
                    font-family: Montserrat;
                    font-size: 0.75rem;
                    color: var(--text-muted);
                    text-transform: uppercase;
                    letter-spacing: 2px;
                    text-decoration: none;
                    transition: 0.3s;
                    font-weight: 600;
                }
        
                .back-link:hover {
                    color: var(--accent-green);
                }
        
                /* --- The New Centered Header --- */
                .page-intro { 
                    text-align: center;
                    margin-top: 3rem;
                    margin-bottom: 5rem; 
                }
        
                .page-intro .overline {
                    text-transform: uppercase;
                    letter-spacing: 4px;
                    font-size: 0.7rem;
                    color: var(--text-muted);
                    font-family: Montserrat;
                    margin-bottom: 1rem;
                }
        
                .page-intro h1 {
                    font-family: var(--font-serif);
                    font-size: 4.5rem; /* Massive, editorial sizing */
                    font-weight: 400;
                    color: var(--text-light);
                    line-height: 1.1;
                    margin-bottom: 1rem;
                }
        
                .page-intro .description {
                    font-family: var(--font-serif);
                    font-style: italic;
                    font-size: 1.2rem;
                    color: #888;
                }

        /* Vault Accordion */
        .accordion-item {
            background: var(--card-dark);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .accordion-header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: 0.3s;
        }

       #acc-phy { border-left-color: #7c9eb5; }  /* Dusty Steel Blue  */
        #acc-mth { border-left-color: #a0522d; }  /* Sienna Brown      */
        #acc-chm { border-left-color: #b8975a; }  /* Warm Ochre        */


        .accordion-header:hover { background: #1a1a1a; }
        
        .subject-title {
            font-family: var(--font-serif);
            font-size: 1.4rem;
        }

        .subject-count {
            font-family: var(--font-sans); /* Keeps it clean and modern like the image */
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            font-weight: 400;
        }

        .accordion-body {
            display: none; /* Hidden by default */
            background: var(--panel-bg);
            padding: 1.5rem 2rem;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
            border-top: 1px solid rgba(255,255,255,0.02);
        }

        .accordion-body.open { display: grid; }

        /* Chapter Card Inside Body */
        .chapter-node {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-dark);
            padding: 1rem;
            border: 1px solid rgba(255,255,255,0.03);
            font-size: 0.85rem;
            transition: 0.2s;
            border-radius: 10px;
        }

        .chapter-node:hover {
            border-color: var(--accent-green);
        }

        .chapter-name {
            font-family: var(--font-sans);
            color: #ddd;
        }

        /* Minimal Aesthetic Button */
        .btn-access {
            background: transparent;
            border: 1px solid #333;
            color: var(--text-muted);
            padding: 6px 10px;
            font-family: Montserrat;
            font-size: 0.60rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            transition: 0.3s;
            font-weight: 400;
            border-radius: 6px;
        }

        .btn-access:hover {
            border-color: var(--accent-green);
            color: var(--accent-green);
            box-shadow: 0 0 10px var(--green-glow);
        }

        @media (max-width: 768px) {
            .page-intro h1 { font-size: 2.5rem; }
            .accordion-body { grid-template-columns: 1fr; }
        }

        .vault-controls {
                    display: flex;
                    align-items: center;
                    gap: 15px;
                }
        
                /* The Custom Tick Box */
                .tick-container {
                    width: 18px;
                    height: 18px;
                    border: 1px solid #333;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    cursor: pointer;
                    transition: 0.3s;
                    background: transparent;
                    border-radius: 6px;
                }
        
                .tick-container:hover {
                    border-color: var(--accent-green);
                }
        
                .tick-container.checked {
                    background: var(--accent-green);
                    border-color: var(--accent-green);
                }
        
                .tick-container.checked::after {
                    content: '✓';
                    color: #000;
                    font-size: 12px;
                    font-weight: 900;
                }

                /* --- The Floating Logo --- */
                        .vault-logo {
                            position: absolute;
                            top: 2.2rem;
                            right: 5%;
                            font-family: var(--font-serif);
                            font-size: 1.5rem;
                            text-decoration: none;
                            color: var(--text-light);
                            font-weight: 600;
                            transition: 0.3s;
                        }
                
                        .vault-logo span { 
                            color: var(--accent-green); 
                        }
                
                        .vault-logo:hover {
                            opacity: 0.8;
                        }
    
        /* --- MOBILE OPTIMIZATION --- */
@media (max-width: 768px) {
    header {
        flex-direction: column;
        gap: 1rem;
        padding: 1rem;
    }
    nav > ul {
        gap: 1rem;
    }
    nav > ul > li > a {
        font-size: 0.7rem;
    }
    .page-header h1 {
        font-size: 2.2rem;
    }
    .layout-container {
        flex-direction: column; /* Stacks sidebar on top of content */
        padding: 1.5rem;
    }
    .sidebar {
        width: 100%;
        position: static; /* Removes the sticky effect for mobile */
    }
    .widget-grid {
        grid-template-columns: 1fr; /* Single column widgets */
    }
    .task-grid {
        grid-template-columns: 1fr; /* Single column cards */
    }
    .day-card textarea {
        min-height: 150px;
    }
}

        function renderVault() {
            for (const subject in vaultData) {
                const container = document.getElementById(`body-${subject}`);
                container.innerHTML = vaultData[subject].map(item => `
                    <div class="chapter-node">
                        <span class="chapter-name">${item.name}</span>
                        <a href="${item.link}" target="_blank" class="btn-access">Access PYQs</a>
                    </div>
                `).join('');
            }
        }

        renderVault();

                    // Using a unique key so it doesn't interfere with Curriculum
                    let vaultState = JSON.parse(localStorage.getItem('scholar_vault_status')) || {};
                    
                    // Toggle boolean
                    vaultState[chapterName] = !vaultState[chapterName];
                    
                    localStorage.setItem('scholar_vault_status', JSON.stringify(vaultState));
                    renderVault();
                }
        
                // --- 2. Enhanced Render Logic ---
                function renderVault() {
                    let vaultState = JSON.parse(localStorage.getItem('scholar_vault_status')) || {};
                    let counts = { phy: 0, mth: 0, chm: 0, total: 0 };
                    
                    // Clear all containers
                    const containers = {
                        phy: document.getElementById('body-phy'),
                        mth: document.getElementById('body-mth'),
                        chm: document.getElementById('body-chm'),
                        completed: document.getElementById('body-completed')
                    };
                    
                    Object.values(containers).forEach(c => c.innerHTML = '');
                    let completedHTML = '';
        
                    for (const subject in vaultData) {
                        vaultData[subject].forEach(item => {
                            const isDone = vaultState[item.name] || false;
                            
                            const nodeHTML = `
                                <div class="chapter-node">
                                    <span class="chapter-name">${item.name}</span>
                                    <div class="vault-controls">
                                        <a href="${item.link}" target="_blank" class="btn-access">Access PYQs</a>
                                        <div class="tick-container ${isDone ? 'checked' : ''}" 
                                             onclick="toggleVaultChapter('${item.name}')" 
                                             title="Mark as Solved">
                                        </div>
                                    </div>
                                </div>
                            `;
        
                            if (isDone) {
                                completedHTML += nodeHTML;
                                counts[subject]++;
                                counts.total++;
                            } else {
                                containers[subject].innerHTML += nodeHTML;
                            }
                        });
                    }
        
                    // Inject Completed list
                    containers.completed.innerHTML = completedHTML || '<p style="color:var(--text-muted); font-size:0.8rem; font-style:italic;">No archives resolved yet.</p>';
                    
                    // Update UI Counters
                    document.getElementById('count-phy').innerText = `${counts.phy} Completed`;
                    document.getElementById('count-mth').innerText = `${counts.mth} Completed`;
                    document.getElementById('count-chm').innerText = `${counts.chm} Completed`;
                    document.getElementById('count-total-vault').innerText = `${counts.total} Completed`;
                }
        
                function toggleAccordion(id) {
                    const body = document.getElementById(id);
                    body.classList.toggle('open');
                }
        
                renderVault();
    </script>
