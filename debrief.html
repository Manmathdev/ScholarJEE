<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Debrief | ScholarJEE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('ScholarJEE Engine Online', reg.scope))
                    .catch(err => console.error('Engine Failure', err));
            });
        }
    </script>
    
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --card-dark: #141414;
            --panel-bg: #0f0f0f;
            --text-light: #f5f5f5;
            --text-muted: #666666;
            --accent-green: #00ff41;
            --green-glow: rgba(0, 255, 65, 0.15);
            --error-red: #ff4757;
            
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Montserrat', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: var(--font-sans);
            line-height: 1.6;
            padding-bottom: 5rem;
        }

        /* Navigation Header */
        header {
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 1.8rem;
            text-decoration: none;
            color: var(--text-light);
            font-weight: 600;
        }
        .logo span { color: var(--accent-green); }

        nav ul { display: flex; list-style: none; gap: 2rem; }
        nav a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
            transition: 0.3s;
        }
        nav a:hover, .active-nav { color: var(--accent-green); }

        .container {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 5%;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 4rem;
        }

        .page-intro { margin-bottom: 3rem; }
        .page-intro p {
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.75rem;
            color: var(--accent-green);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .page-intro h1 { font-family: var(--font-serif); font-size: 3rem; font-weight: 400; }

        /* The Input Matrix */
        .form-panel {
            background: var(--card-dark);
            padding: 2.5rem;
            border: 1px solid rgba(255,255,255,0.05);
            border-top: 2px solid var(--accent-green);
            height: fit-content;
            position: sticky;
            top: 120px;
        }

        .form-label {
            display: block;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.6rem;
        }

        .form-control {
            width: 100%;
            background: var(--panel-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-light);
            padding: 12px 15px;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            transition: 0.3s;
            outline: none;
            margin-bottom: 1.5rem;
        }

        .form-control:focus { border-color: var(--accent-green); box-shadow: 0 0 10px var(--green-glow); }

        .btn-submit {
            width: 100%;
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            padding: 18px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: 0.4s;
            font-weight: 700;
            margin-top: 10px;
        }

        .btn-submit:hover { background: var(--accent-green); color: #000; box-shadow: 0 0 20px var(--green-glow); }

        /* The Filter HUD */
        .filter-hud {
            background: var(--panel-bg);
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr 0.5fr;
            gap: 15px;
            align-items: end;
        }

        /* Ledger Entries */
        .log-entry {
            background: var(--card-dark);
            border: 1px solid rgba(255,255,255,0.03);
            border-left: 3px solid #333;
            padding: 1.5rem 2.5rem;
            position: relative;
            margin-bottom: 1.5rem;
        }

        .type-cf { border-left-color: var(--error-red); }
        .type-ce { border-left-color: #fbc531; }
        .type-ff { border-left-color: #00a8ff; }
        .type-tp { border-left-color: #9c88ff; }

        .log-topic { font-family: var(--font-serif); font-size: 1.4rem; color: var(--text-light); margin-bottom: 0.5rem; }
        .log-meta { font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; display: flex; gap: 20px; margin-bottom: 1.5rem; }
        .log-tag { padding: 2px 8px; background: rgba(255,255,255,0.05); color: var(--accent-green); }

        .log-question { background: rgba(0, 0, 0, 0.4); border-left: 2px solid #333; padding: 1.2rem; font-family: var(--font-mono); font-size: 0.8rem; color: #888; margin-bottom: 1.5rem; line-height: 1.6; }
        .log-notes { font-size: 0.9rem; color: #ddd; border-top: 1px dashed rgba(255,255,255,0.05); padding-top: 1rem; }

        .btn-delete { position: absolute; top: 1.5rem; right: 1.5rem; background: transparent; border: none; color: #444; font-family: var(--font-mono); font-size: 0.65rem; cursor: pointer; transition: 0.3s; letter-spacing: 1px; }
        .btn-delete:hover { color: var(--error-red); }

        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } .filter-hud { grid-template-columns: 1fr; } }
        
        /* --- MOBILE OPTIMIZATION --- */
@media (max-width: 768px) {
    header {
        flex-direction: column;
        gap: 1rem;
        padding: 1rem;
    }
    nav > ul {
        gap: 1rem;
    }
    nav > ul > li > a {
        font-size: 0.7rem;
    }
    .page-header h1 {
        font-size: 2.2rem;
    }
    .layout-container {
        flex-direction: column; /* Stacks sidebar on top of content */
        padding: 1.5rem;
    }
    .sidebar {
        width: 100%;
        position: static; /* Removes the sticky effect for mobile */
    }
    .widget-grid {
        grid-template-columns: 1fr; /* Single column widgets */
    }
    .task-grid {
        grid-template-columns: 1fr; /* Single column cards */
    }
    .day-card textarea {
        min-height: 150px;
    }
}
    
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Scholar<span>JEE</span></a>
        <nav>
            <ul>
                <li><a href="index.html">Command</a></li>
                <li><a href="curriculum.html">Curriculum</a></li>
                <li><a href="debrief.html" class="active-nav">Debrief</a></li>
                <li><a href="telemetry.html">Telemtry</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <aside>
            <div class="page-intro">
                <p>System Diagnostics</p>
                <h1>The Debrief</h1>
            </div>

            <div class="form-panel">
                <form id="debriefForm">
                    <label class="form-label">Subject</label>
                    <select id="subjectInput" class="form-control" required onchange="populateFormChapters()">
                        <option value="" disabled selected>Select Subject...</option>
                        <option value="phy">Physics</option>
                        <option value="mth">Mathematics</option>
                        <option value="chm">Chemistry</option>
                    </select>

                    <label class="form-label">Failure Type</label>
                    <select id="typeInput" class="form-control" required>
                        <option value="cf">Conceptual Flaw</option>
                        <option value="ce">Calculation Error</option>
                        <option value="ff">Formula Forgotten</option>
                        <option value="tp">Time Pressure</option>
                    </select>

                    <label class="form-label">Chapters</label>
                    <select id="chapterInput" class="form-control" required>
                        <option value="" disabled selected>Awaiting Subject...</option>
                    </select>

                    <label class="form-label">Target Intel (Question)</label>
                    <textarea id="questionInput" class="form-control" placeholder="Describe the question or reference..."></textarea>

                    <label class="form-label">Autopsy Notes</label>
                    <textarea id="notesInput" class="form-control" placeholder="Analysis of why it failed and the correction..."></textarea>

                    <button type="submit" class="btn-submit">Log Incident</button>
                </form>
            </div>
        </aside>

        <main>
            <div class="filter-hud">
                <div>
                    <label class="form-label">Filter Subject</label>
                    <select id="filterSubject" class="form-control" style="margin-bottom:0;" onchange="populateFilterChapters(); filterLogs();">
                        <option value="all">Show All Subjects</option>
                        <option value="phy">Physics</option>
                        <option value="mth">Mathematics</option>
                        <option value="chm">Chemistry</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">Filter Chapters</label>
                    <select id="filterChapter" class="form-control" style="margin-bottom:0;" onchange="filterLogs()">
                        <option value="all">All Chapters</option>
                    </select>
                </div>
                <button class="btn-submit" style="padding:11px; margin:0;" onclick="resetFilters()">Reset</button>
            </div>

            <div id="logContainer"></div>
        </main>
    </div>

    <script>
        const syllabus = {
            phy: ["Units & Dimensions", "1D Kinematics", "2D Kinematics", "Work, Power, Energy", "Gravitation", "Electrostatics", "Capacitance", "Current Electricity", "Moving Charges & Mag.", "EMI", "Alternating Current", "EM Waves", "Ray Optics", "Thermodynamics & KTG", "Modern Physics", "Semiconductors"],
            mth: ["Relations & Functions", "Sequence & Series", "Matrices", "Determinants", "Binomial Theorem", "Permutations & Comb.", "Straight Lines", "Conic Sections", "Vectors", "3D Geometry", "Definite Integration", "Area Under Curve", "Differential Equations", "Statistics"],
            chm: ["Mole Concept", "Atomic Structure", "Periodic Table", "Chemical Bonding", "GOC", "Hydrocarbons", "Aldehydes", "Ketones", "Carboxylic Acids", "Biomolecules", "Chemical Kinetics", "Solutions", "Electrochemistry", "Coordination Comp.", "d & f Block"]
        };

        const typeMap = { 'cf': 'Conceptual Flaw', 'ce': 'Calculation Error', 'ff': 'Formula Forgotten', 'tp': 'Time Pressure' };

        function populateFormChapters() {
            const sub = document.getElementById('subjectInput').value;
            const select = document.getElementById('chapterInput');
            select.innerHTML = syllabus[sub].map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function populateFilterChapters() {
            const sub = document.getElementById('filterSubject').value;
            const select = document.getElementById('filterChapter');
            if (sub === 'all') {
                select.innerHTML = '<option value="all">All Chapters</option>';
            } else {
                select.innerHTML = '<option value="all">All Chapters</option>' + syllabus[sub].map(c => `<option value="${c}">${c}</option>`).join('');
            }
        }

        document.getElementById('debriefForm').onsubmit = (e) => {
            e.preventDefault();
            const log = {
                id: Date.now(),
                sub: document.getElementById('subjectInput').value,
                type: document.getElementById('typeInput').value,
                chapter: document.getElementById('chapterInput').value,
                question: document.getElementById('questionInput').value,
                notes: document.getElementById('notesInput').value,
                date: new Date().toLocaleDateString('en-GB')
            };
            const logs = JSON.parse(localStorage.getItem('scholar_logs') || '[]');
            logs.unshift(log);
            localStorage.setItem('scholar_logs', JSON.stringify(logs));
            e.target.reset();
            filterLogs();
        };

        function filterLogs() {
            const subFilter = document.getElementById('filterSubject').value;
            const chapFilter = document.getElementById('filterChapter').value;
            const logs = JSON.parse(localStorage.getItem('scholar_logs') || '[]');
            
            const filtered = logs.filter(l => {
                const subMatch = subFilter === 'all' || l.sub === subFilter;
                const chapMatch = chapFilter === 'all' || l.chapter === chapFilter;
                return subMatch && chapMatch;
            });

            const container = document.getElementById('logContainer');
            if (filtered.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted); text-align:center; padding-top:2rem; font-family: var(--font-mono); font-size: 0.85rem;">No matching incidents found in database.</p>';
                return;
            }

            container.innerHTML = filtered.map(l => `
                <div class="log-entry type-${l.type}">
                    <button class="btn-delete" onclick="deleteLog(${l.id})">TERMINATE ENTRY</button>
                    <div class="log-topic">${l.chapter}</div>
                    <div class="log-meta">
                        <span class="log-tag">${l.sub.toUpperCase()}</span>
                        <span>${typeMap[l.type]}</span>
                        <span>// ${l.date}</span>
                    </div>
                    <div class="log-question">${l.question || 'No intel recorded.'}</div>
                    <div class="log-notes"><strong style="color:var(--accent-green); font-family:var(--font-mono); font-size:0.7rem; letter-spacing:1px;">AUTOPSY FIX //</strong><br>${l.notes}</div>
                </div>
            `).join('');
        }

        function deleteLog(id) {
            let logs = JSON.parse(localStorage.getItem('scholar_logs') || '[]');
            logs = logs.filter(l => l.id !== id);
            localStorage.setItem('scholar_logs', JSON.stringify(logs));
            filterLogs();
        }

        function resetFilters() {
            document.getElementById('filterSubject').value = 'all';
            populateFilterChapters();
            filterLogs();
        }

        // Init
        filterLogs();
    </script>
    <footer style="padding: 2rem 5%; text-align: center; border-top: 1px solid rgba(0,0,0,0.05); margin-top: 3rem;">
            <p style="font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; color: var(--accent-green); font-weight: 500;">
                © <span id="year"></span> Scholar. All Rights Reserved. Created by Manmath.
            </p>
        </footer>
        
        <script>
            document.getElementById('year').textContent = new Date().getFullYear();
            if ('serviceWorker' in navigator) {
  navigator.serviceWorker.ready.then(registration => {
    registration.update(); // Checks GitHub for a new sw.js on every load
  });
}
        </script>
</body>
</html>
